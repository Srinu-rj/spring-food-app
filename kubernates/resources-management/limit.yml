apiVersion: v1
kind: LimitRange
metadata:
   name: limit-range
   namespace: app-namespace
spec:
   limits:
     - type: Pod  #TODO FOR POD
       min:
         cpu: 50m
         memory: 5Mi
       max:
         cpu: "2"
         memory: 6Gi
     - type: Container
       defaultRequest:
         cpu: 100m
         memory: 10Mi
       default:
         cpu: 200m
         memory: 15Mi
       min:
         cpu: 50m
         memory: 5Mi
       max:
         cpu: "1"
         memory: 100Gi
       maxLimitRequestRatio:
         cpu: "4"
         memory: 10
     - type: PersistentVolumeClaim
       min:
         storage: 1Gi
       max:
         storage: 10Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: user-quota
  namespace: app-namespace
spec:
  hard:
    pods: "10"
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
---

