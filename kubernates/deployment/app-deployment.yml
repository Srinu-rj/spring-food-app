apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment-blue
  namespace: database-production
spec:
  replicas: 7
  selector:
    matchLabels:
      app: app-deployment
  template:
    metadata:
      labels:
        app: app-deployment
    spec:
#      nodeName: local-cluster-m04 # you can specify with in Particular node.
#      nodeSelector:
#        kubernetes.io/hostname: "new-cluster"
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#              - matchExpressions:
#                  - key: app-node
#                    operator: In
#                    values:
#                      - available
#        podAntiAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            - labelSelector:
#                matchLabels:
#                  app: app-deployment
#              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: app-deployment
          image: srinu641/spring-image:1.0
          imagePullPolicy: IfNotPresent #the image is pulled only if it is not already present locally.
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          env:   # Setting Environmental Variables
            - name: DB_HOST   # Setting Database host address from configMap
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: host

            - name: DB_NAME  # Setting Database name from configMap
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: dbName

            - name: DB_USERNAME  # Setting Database username from Secret
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: username

            - name: DB_PASSWORD # Setting Database password from Secret
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: password
#            - name: DB_HOST   # Setting Database host address
#              value: mysql
#            - name: DB_NAME  # Setting Database name
#              value: jdbc:mysql://rds-database.cn2aysi4umep.us-east-1.rds.amazonaws.com/spring
#            - name: DB_USERNAME  # Setting Database username
#              value: root
#            - name: DB_PASSWORD # Setting Database password
#              value: srinu1234
          ports:
            - containerPort: 8998
              name: app-deployment
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-volume
      volumes:
        - name: mysql-volume
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---

#            - name: DB_HOST   # Setting Database host address
#              value: mysql
#            - name: DB_NAME  # Setting Database name
#              value: jdbc:mysql://rds-database.cn2aysi4umep.us-east-1.rds.amazonaws.com/spring
#            - name: DB_USERNAME  # Setting Database username
#              value: root
#            - name: DB_PASSWORD # Setting Database password
#              value: srinu1234

---
#todo  Define a 'Service' To Expose the application
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: database-production
spec:
  ports:
    - protocol: "TCP"
      port: 8998    # TODO Port inside the cluster
      targetPort: 8998   #TODO  Port exposed to the outside
  selector:
    app: app-deployment
  type: NodePort #todo ClusterIP
---

