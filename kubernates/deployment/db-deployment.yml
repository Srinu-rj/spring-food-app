# Define a 'Persistent Volume Claim'(PVC) for MySQL Storage, dynamically provisioned by cluster
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim # todo name of PVC essential for identifying the storage data
  namespace: app-namespace  
  labels:
    app: mysql
    tier: database
spec:
  storageClassName: gp2
  accessModes:
    - ReadWriteOnce   #todo This specifies the mode of the claim that we are trying to create.
  resources:
    requests:
      storage: 5Gi    #todo This will tell kubernetes about the amount of space we are trying to claim.
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: app-namespace
  labels:
    app: mysql
    tier: database
spec:
  ports:
    - port: 3307
      targetPort: 3307
  selector:
    app: mysql
    tier: database
  clusterIP: None
---
---
# Deployment specification begins here
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: app-namespace
  labels:
    app: mysql
    tier: database
spec:
#  nodeName: Your_Node_name
  selector: # mySQL Pod Should contain same labels
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels: # todo -> Must match 'Service' and 'Deployment' selectors
        app: mysql
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.40
          imagePullPolicy: "IfNotPresent"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
#            - name: MYSQL_ROOT_PASSWORD
#              value: root
#            - name: MYSQL_DATABASE
#              value: srinu1234
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistance-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistance-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim #todo must match with pvc
---
