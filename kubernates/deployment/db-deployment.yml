# Define a 'Persistent Volume Claim'(PVC) for MySQL Storage, dynamically provisioned by cluster
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim # todo name of PVC essential for identifying the storage data
  namespace: database-production
  labels:
    app: mysql
    tier: database
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: "demo-storage"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: database-production
  labels:
    app: mysql
    tier: database
spec:
  selector:
    app: mysql
    tier: database
  ports:
    - protocol: TCP
      port: 3307
      targetPort: 3307
  type: NodePort # None # We Use DNS, Thus ClusterIP is not relevant
---
---
# Deployment specification begins here
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: database-production
  labels:
    app: mysql
    tier: database
spec:
#  nodeName: minikube-m02
#  nodeSelector:
#    kubernetes.io/hostname: new-cluster-m02
#  affinity:
#    nodeAffinity:
#      requiredDuringSchedulingIgnoredDuringExecution:
#        nodeSelectorTerms:
#          - matchExpressions:
#              - key: node-type
#                operator: In
#                values:
#                  - worker
#    podAntiAffinity:
#      requiredDuringSchedulingIgnoredDuringExecution:
#        - labelSelector:
#            matchLabels:
#              app: mysql
#          topologyKey: "kubernetes.io/hostname"
  selector: # mySQL Pod Should contain same labels
    matchLabels:
      app: mysql
#  strategy:
#    type: Recreate
  template:
    metadata:
      labels: # todo -> Must match 'Service' and 'Deployment' selectors
        app: mysql
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.40
          imagePullPolicy: "IfNotPresent"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: password

            - name: MYSQL_DATABASE # Setting Database Name from a 'ConfigMap'
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: dbName
#            - name: MYSQL_ROOT_PASSWORD
#              value: srinu1234
#            - name: MYSQL_DATABASE
#              value: spring
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-persistent-storage
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
