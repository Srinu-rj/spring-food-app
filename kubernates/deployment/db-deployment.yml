# Define a 'Persistent Volume Claim'(PVC) for MySQL Storage, dynamically provisioned by cluster
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim # todo name of PVC essential for identifying the storage data
  namespace: app-namespace  
  labels:
    app: mysql
    tier: database
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: "demo-storage"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: app-namespace
  labels:
    app: mysql
    tier: database
spec:
  selector:
    app: mysql
    tier: database
  ports:
    - protocol: TCP
      port: 3307
      targetPort: 3307
  type: NodePort
---
---
# Deployment specification begins here
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: app-namespace
  labels:
    app: mysql
    tier: database
spec:
#  nodeName: new-cluster-m02
#  nodeSelector:
#    kubernetes.io/hostname: new-cluster-m02
  selector: # mySQL Pod Should contain same labels
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels: # todo -> Must match 'Service' and 'Deployment' selectors
        app: mysql
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.40
          imagePullPolicy: "IfNotPresent"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
#            - name: MYSQL_ROOT_PASSWORD
#              value: root
#            - name: MYSQL_DATABASE
#              value: srinu1234
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - mountPath: /data/db
              name: mysql-volume
      volumes:
        - name: mysql-volume
          persistentVolumeClaim:
            claimName: mysql-pv-claim
#          volumeMounts:
#            - name: mysql-persistance-storage
#              mountPath: /var/lib/mysql
#      volumes:
#        - name: mysql-persistance-storage
#          persistentVolumeClaim:
#            claimName: mysql-pv-claim #todo must match with pvc
