apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: myapp-blue-green
spec:
  hosts:
    - "*"
  gateways:
    - myapp-gateway
  http:
    - name: myapp-test
      match:
        - headers:
            cookie:
              regex: "^(.*?;)?(test=true)(;.*)?$"
      route:
        - destination:
            host: app-service
            subset: $COLOR_TEST

    - name: myapp-default
      route:
        - destination:
            host: app-service
            subset: $COLOR_ACTIVE


---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: myapp-blue-green
spec:
  host: app-service
  subsets:
    - name: blue
      labels:
        color: blue
    - name: green
      labels:
        color: green
---